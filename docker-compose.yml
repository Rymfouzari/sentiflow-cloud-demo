services:
  # Base de données PostgreSQL avec pgvector
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: sentiflow
      POSTGRES_PASSWORD: sentiflow
      POSTGRES_DB: sentiflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis pour cache/queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Celery Worker - exécute les tâches en arrière-plan
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TWITTER_API_KEY=${TWITTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat - planificateur de tâches périodiques
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
      - TWITTER_API_KEY=${TWITTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Zookeeper - gestionnaire de Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  # Kafka - streaming de données
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Kafka Consumer - traite les tweets en temps réel
  kafka-consumer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -u -m backend.app.kafka_consumer
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # MLflow - tracking des experiences ML
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_data:
